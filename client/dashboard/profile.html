<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../static/images/nav-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile • Sir Kothay?</title>
  <meta name="description" content="Edit your Sir Kothay profile">
  <link rel="stylesheet" href="../static/css/style.css?v=ui-fix-30">
  <link rel="stylesheet" href="../static/css/components.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .sk-profile-header {
      background: linear-gradient(135deg, var(--sk-primary), #6366f1);
      height: 140px;
      border-radius: var(--sk-radius-xl) var(--sk-radius-xl) 0 0;
      position: relative;
    }
    .sk-profile-avatar-container {
      position: absolute;
      bottom: -40px;
      left: 32px;
      background: var(--sk-bg-surface);
      padding: 6px;
      border-radius: 50%;
      box-shadow: var(--sk-shadow-md);
    }
    .sk-profile-avatar-container img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .sk-profile-info {
      padding: 56px 32px 32px 32px;
    }
    .sk-profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .sk-profile-form-section {
      background: var(--sk-bg-surface);
      border: 1px solid var(--sk-border);
      border-radius: var(--sk-radius-xl);
      padding: 24px;
      box-shadow: var(--sk-shadow-sm);
    }
    .sk-section-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--sk-text-primary);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid var(--sk-border);
      padding-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="sk-app">
    <!-- Sidebar -->
    <aside class="sk-sidebar">
      <div class="sk-sidebar-logo"><img src="../static/images/nav-logo.png" alt="Sir Kothay"></div>
      <nav class="sk-sidebar-nav"></nav>
      <div class="sk-sidebar-footer"></div>
    </aside>
    <div class="sk-sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="sk-main">
      <div class="sk-page">
        <!-- Top Nav -->
        <header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
          <div>
            <h1 class="sk-page-title">Profile Settings</h1>
            <p class="sk-page-subtitle">Manage your personal information and preferences.</p>
          </div>
          <button id="mobileMenuBtn" class="sk-btn sk-btn-ghost sk-btn-icon" style="display:none;"><i class="bi bi-list"></i></button>
        </header>

        <div class="sk-card" style="padding:0;overflow:visible;margin-bottom:2rem;">
          <div class="sk-profile-header">
            <div class="sk-profile-avatar-container" style="cursor: pointer;" onclick="document.getElementById('profile_image').click()" title="Change Profile Image">
              <img id="profileImage" src="../static/images/image.png" alt="User Avatar">
              <div style="position: absolute; bottom: 0; right: 0; background: var(--sk-primary); color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; box-shadow: var(--sk-shadow-md); border: 2px solid var(--sk-bg-surface); z-index: 2;">
                <i class="bi bi-pencil-fill" style="font-size: 0.875rem;"></i>
              </div>
            </div>
          </div>
          <div class="sk-profile-info">
            <h2 id="displayName" style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.25rem;">Loading...</h2>
            <div style="display:flex; flex-wrap:wrap; gap: 1rem; color: var(--sk-text-secondary); font-size: 0.875rem;">
              <span id="displayEmail"><i class="bi bi-envelope me-1"></i>...</span>
              <span id="displayRoleBadge"></span>
            </div>
          </div>
        </div>

        <form id="profileForm" enctype="multipart/form-data">
          <!-- Hidden file input for profile image -->
          <input type="file" id="profile_image" name="profile_image" accept="image/*" style="display:none;" onchange="previewProfileImage(this)">

          <div class="sk-profile-grid">
            
            <!-- Basic Info Section -->
            <div class="sk-profile-form-section">
              <div class="sk-section-title">
                <i class="bi bi-person-badge text-primary"></i> Basic Information
              </div>
              <div class="sk-form-group">
                <label class="sk-label">Full Name</label>
                <input type="text" id="username" name="username" required class="sk-input" placeholder="e.g. John Doe">
              </div>
              <div class="sk-form-group">
                <label class="sk-label">Email Address</label>
                <input type="email" id="email" name="email" required class="sk-input" placeholder="you@example.com">
              </div>
              
              <!-- Student ID (Hidden by default) -->
              <div class="sk-form-group hidden" id="studentIdGroup">
                <label class="sk-label">Student ID</label>
                <input type="text" id="student_id" name="student_id" class="sk-input" placeholder="e.g. 011242111">
                <p class="sk-help-text text-primary" style="margin-top:0.25rem;font-size:0.75rem;"><i class="bi bi-info-circle me-1"></i>Your Student ID must be unique.</p>
              </div>

              <div class="sk-form-group">
                <label class="sk-label">Phone Number (Optional)</label>
                <input type="tel" id="phone_number" name="phone_number" class="sk-input" placeholder="+880...">
              </div>
            </div>

            <!-- Professional Info Section -->
            <div class="sk-profile-form-section">
              <div class="sk-section-title">
                <i class="bi bi-briefcase text-primary"></i> Professional Details
              </div>
              <div class="sk-form-group">
                <label class="sk-label">Organization / University</label>
                <input type="text" id="organization" name="organization" class="sk-input" placeholder="e.g. United International University">
              </div>
              <div class="sk-form-group">
                <label class="sk-label">Designation / Role</label>
                <input type="text" id="designation" name="designation" class="sk-input" placeholder="e.g. Senior Lecturer">
              </div>
            </div>
          </div>

          <!-- Bio Section -->
          <div class="sk-profile-form-section" style="margin-top: 1.5rem;">
            <div class="sk-section-title">
              <i class="bi bi-chat-quote text-primary"></i> About You
            </div>
            <div class="sk-form-group">
              <label class="sk-label">Bio</label>
              <textarea id="bio" name="bio" rows="4" placeholder="Write a short bio about yourself..." class="sk-textarea"></textarea>
            </div>
          </div>

          <div style="display:flex; justify-content:flex-end; gap: 1rem; margin-top: 2rem; margin-bottom: 3rem;">
            <a href="home.html" id="backBtn" class="sk-btn sk-btn-secondary">Cancel</a>
            <button type="submit" class="sk-btn sk-btn-primary" id="saveBtn">
              <i class="bi bi-check2-circle me-1"></i> Save Changes
            </button>
          </div>
        </form>

        <!-- Security Section -->
        <form id="passwordForm">
          <div class="sk-profile-form-section" style="margin-top: 1.5rem; margin-bottom: 3rem;">
            <div class="sk-section-title">
              <i class="bi bi-shield-lock text-primary"></i> Security (Change Password)
            </div>
            
            <div class="sk-profile-grid">
              <div class="sk-form-group">
                <label class="sk-label">Current Password</label>
                <div style="position:relative">
                  <input type="password" id="old_password" name="old_password" class="sk-input" placeholder="Enter current password" required style="padding-right:2.75rem">
                  <button type="button" onclick="togglePwd('old_password','oldPwdIcon')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sk-text-placeholder);cursor:pointer;padding:4px;font-size:1.125rem">
                    <i class="bi bi-eye" id="oldPwdIcon"></i>
                  </button>
                </div>
              </div>
              <div class="sk-form-group">
                <label class="sk-label">New Password</label>
                <div style="position:relative">
                  <input type="password" id="new_password" name="new_password" class="sk-input" placeholder="Enter new password" required style="padding-right:2.75rem">
                  <button type="button" onclick="togglePwd('new_password','newPwdIcon')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sk-text-placeholder);cursor:pointer;padding:4px;font-size:1.125rem">
                    <i class="bi bi-eye" id="newPwdIcon"></i>
                  </button>
                </div>
              </div>
              <div class="sk-form-group">
                <label class="sk-label">Confirm New Password</label>
                <div style="position:relative">
                  <input type="password" id="confirm_password" name="confirm_password" class="sk-input" placeholder="Confirm new password" required style="padding-right:2.75rem">
                  <button type="button" onclick="togglePwd('confirm_password','confirmPwdIcon')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sk-text-placeholder);cursor:pointer;padding:4px;font-size:1.125rem">
                    <i class="bi bi-eye" id="confirmPwdIcon"></i>
                  </button>
                </div>
              </div>
            </div>

            <div style="display:flex; justify-content:flex-end; margin-top: 1.5rem;">
              <button type="submit" class="sk-btn sk-btn-warning" id="pwdBtn">
                <i class="bi bi-key me-1"></i> Update Password
              </button>
            </div>
          </div>
        </form>

      </div>
    </main>
  </div>

  <script src="../static/js/api-config.js"></script>
  <script src="../static/js/utils.js"></script>
  <script src="../static/js/theme.js"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/layout.js"></script>
  <script>
    SKLayout.init({
      page: 'profile',
      requireAuth: true,
      type: 'dashboard',
      onReady: async function() {
        await loadProfile();
      }
    });

    async function loadProfile() {
      try {
        const token = localStorage.getItem('access_token');
        
        // 1. Fetch user role first
        const meRes = await fetch(API_BASE_URL + '/api/auth/users/me/', { headers: { 'Authorization': `Bearer ${token}` } });
        const meData = await meRes.json();
        const role = meData.role;
        
        // Setup Back Button correctly depending on role
        document.getElementById('backBtn').href = role === 'STUDENT' ? 'student.html' : 'home.html';
        
        // Setup Badge
        let badgeHtml = '';
        if (role === 'STUDENT') badgeHtml = '<span class="sk-badge" style="background:var(--sk-primary-light);color:var(--sk-primary);"><i class="bi bi-mortarboard-fill me-1"></i>Student</span>';
        else if (role === 'FACULTY') badgeHtml = '<span class="sk-badge" style="background:var(--sk-success-bg);color:var(--sk-success);"><i class="bi bi-person-workspace me-1"></i>Faculty</span>';
        else badgeHtml = '<span class="sk-badge" style="background:var(--sk-bg-muted);color:var(--sk-text-secondary);"><i class="bi bi-shield-lock me-1"></i>Admin</span>';
        document.getElementById('displayRoleBadge').innerHTML = badgeHtml;

        // 2. Fetch User Details
        const res = await fetch(API_ENDPOINTS.USER_DETAILS, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        if (res.ok) {
          // Populate Hero
          document.getElementById('displayName').textContent = data.user_username || 'User';
          document.getElementById('displayEmail').innerHTML = `<i class="bi bi-envelope me-1"></i>${data.user_email || ''}`;
          document.getElementById('profileImage').src = SKUtils.resolveProfileImage(data.profile_image_url || data.profile_image);

          // Populate Form
          document.getElementById('username').value = data.user_username || '';
          document.getElementById('email').value = data.user_email || '';
          document.getElementById('phone_number').value = data.phone_number || '';
          document.getElementById('organization').value = data.organization || '';
          document.getElementById('designation').value = data.designation || '';
          document.getElementById('bio').value = data.bio || '';
          
          // Student ID logic
          if (role === 'STUDENT') {
            document.getElementById('studentIdGroup').classList.remove('hidden');
            document.getElementById('student_id').value = data.user_student_id || '';
          }
        } else {
          throw new Error(data.detail || 'Failed to load profile');
        }
      } catch (error) {
        console.error('Profile Load Error:', error);
        SKComponents.toast('Failed to load profile details.', 'error');
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="sk-spinner sk-spinner-sm me-2"></span> Saving...';

      const formData = new FormData();
      formData.append('username', document.getElementById('username').value.trim());
      formData.append('email', document.getElementById('email').value.trim());
      formData.append('phone_number', document.getElementById('phone_number').value.trim());
      formData.append('organization', document.getElementById('organization').value.trim());
      formData.append('designation', document.getElementById('designation').value.trim());
      formData.append('bio', document.getElementById('bio').value.trim());
      
      const studentIdInput = document.getElementById('student_id');
      if (!document.getElementById('studentIdGroup').classList.contains('hidden')) {
        formData.append('student_id', studentIdInput.value.trim());
      }

      try {
        const token = localStorage.getItem('access_token');
        const response = await fetch(API_ENDPOINTS.UPDATE_USER_DETAILS, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        
        const data = await response.json();
        if (response.ok) {
          SKComponents.toast('Profile updated successfully!', 'success');
          SKLayout.clearUserCache();
          setTimeout(() => window.location.reload(), 1000);
        } else {
          // Show specifically the first error
          const firstError = Object.values(data)[0];
          const errorText = Array.isArray(firstError) ? firstError[0] : firstError;
          SKComponents.toast(errorText || 'Failed to update profile.', 'error');
        }
      } catch (error) {
        console.error('Update Error:', error);
        SKComponents.toast('A network error occurred while updating profile.', 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="bi bi-check2-circle me-1"></i> Save Changes';
      }
    });

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwdBtn = document.getElementById('pwdBtn');
      pwdBtn.disabled = true;
      pwdBtn.innerHTML = '<span class="sk-spinner sk-spinner-sm me-2"></span> Updating...';

      const old_password = document.getElementById('old_password').value;
      const new_password = document.getElementById('new_password').value;
      const confirm_password = document.getElementById('confirm_password').value;

      if (new_password !== confirm_password) {
        SKComponents.toast('New passwords do not match.', 'error');
        pwdBtn.disabled = false;
        pwdBtn.innerHTML = '<i class="bi bi-key me-1"></i> Update Password';
        return;
      }

      try {
        const token = localStorage.getItem('access_token');
        const res = await fetch(API_BASE_URL + '/api/auth/users/change_password/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ old_password, new_password, confirm_password })
        });
        const data = await res.json();
        
        if (res.ok) {
          SKComponents.toast('Password updated successfully.', 'success');
          document.getElementById('old_password').value = '';
          document.getElementById('new_password').value = '';
          document.getElementById('confirm_password').value = '';
        } else {
          SKComponents.toast(data.error || 'Failed to change password.', 'error');
        }
      } catch (err) {
        console.error(err);
        SKComponents.toast('Network error occurred.', 'error');
      } finally {
        pwdBtn.disabled = false;
        pwdBtn.innerHTML = '<i class="bi bi-key me-1"></i> Update Password';
      }
    });

    function togglePwd(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    async function previewProfileImage(input) {
      if (input.files && input.files[0]) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('profileImage').src = e.target.result;
        };
        reader.readAsDataURL(file);

        // Auto-save the image
        const formData = new FormData();
        formData.append('profile_image', file);

        try {
          const token = localStorage.getItem('access_token');
          const res = await fetch(API_ENDPOINTS.UPDATE_USER_DETAILS, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
          });
          
          if (res.ok) {
            SKComponents.toast('Profile picture updated successfully!', 'success');
            SKLayout.clearUserCache();
            setTimeout(() => window.location.reload(), 1000);
          } else {
            const data = await res.json();
            const firstError = Object.values(data)[0];
            const errorText = Array.isArray(firstError) ? firstError[0] : firstError;
            SKComponents.toast(errorText || 'Failed to update picture.', 'error');
          }
        } catch (error) {
          console.error('Image Upload Error:', error);
          SKComponents.toast('Network error occurred while uploading picture.', 'error');
        }
      }
    }
  </script>
</body>
</html>
