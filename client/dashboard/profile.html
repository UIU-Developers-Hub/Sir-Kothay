<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile • Sir Kothay?</title>
  <meta name="description" content="Edit your Sir Kothay profile">
  <link rel="stylesheet" href="../static/css/style.css?v=ui-fix-30">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="sk-app">
    <!-- Sidebar -->
    <aside class="sk-sidebar">
      <div class="sk-sidebar-logo"><img src="../static/images/logo.png" alt="Sir Kothay"><span class="sk-sidebar-logo-text">Sir <span>Kothay</span></span></div>
      <nav class="sk-sidebar-nav"></nav>
      <div class="sk-sidebar-footer"></div>
    </aside>
    <div class="sk-sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="sk-main">
      <div class="sk-page">
        <!-- Profile Header Card -->
        <div class="sk-card" style="overflow:hidden;margin-bottom:2rem;padding:0">
          <div style="height:120px;background:linear-gradient(135deg,var(--sk-orange-500),var(--sk-orange-600))"></div>
          <div style="padding:0 1.5rem 2rem;margin-top:-3.5rem">
            <div style="display:flex;flex-wrap:wrap;align-items:flex-end;gap:1.5rem">
              <div style="position:relative">
                <img id="profileImage" src="../static/images/image.png" alt="User" style="width:112px;height:112px;border-radius:var(--sk-radius-xl);border:4px solid var(--sk-bg-surface);box-shadow:var(--sk-shadow-lg);object-fit:cover">
              </div>
              <div style="flex:1;min-width:200px;padding-bottom:0.5rem">
                <h1 id="displayName" style="font-size:var(--sk-text-2xl);font-weight:800;color:var(--sk-text-primary)">Loading...</h1>
                <div style="display:flex;flex-wrap:wrap;align-items:center;gap:0.75rem;margin-top:0.5rem;color:var(--sk-text-secondary);font-size:var(--sk-text-sm)">
                  <span id="displayEmail" style="display:flex;align-items:center;gap:0.25rem"><i class="bi bi-envelope"></i></span>
                  <span id="displayDesignation" style="display:flex;align-items:center;gap:0.25rem"></span>
                  <span id="displayOrganization" style="display:flex;align-items:center;gap:0.25rem"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Edit Profile Form Card -->
        <div class="sk-card">
          <div class="sk-card-header" style="margin-bottom:1.5rem">
            <div style="display:flex;align-items:center;gap:0.75rem">
              <div style="padding:0.75rem;border-radius:var(--sk-radius-xl);background:var(--sk-primary-light)">
                <i class="bi bi-person-gear" style="font-size:1.5rem;color:var(--sk-primary)"></i>
              </div>
              <div>
                <div class="sk-card-title">Edit Profile</div>
                <div class="sk-card-subtitle">Update your personal information and preferences</div>
              </div>
            </div>
          </div>

          <form id="profileForm" enctype="multipart/form-data">
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem">
              <div class="sk-form-group">
                <label class="sk-label"><i class="bi bi-person-fill" style="color:var(--sk-primary);margin-right:0.25rem"></i> Username</label>
                <input type="text" id="username" name="username" required class="sk-input">
              </div>
              <div class="sk-form-group">
                <label class="sk-label"><i class="bi bi-envelope-fill" style="color:var(--sk-primary);margin-right:0.25rem"></i> Email</label>
                <input type="email" id="email" name="email" required class="sk-input">
              </div>
              <div class="sk-form-group">
                <label class="sk-label"><i class="bi bi-telephone-fill" style="color:var(--sk-primary);margin-right:0.25rem"></i> Phone Number</label>
                <input type="tel" id="phone_number" name="phone_number" class="sk-input">
              </div>
              <div class="sk-form-group">
                <label class="sk-label"><i class="bi bi-building" style="color:var(--sk-primary);margin-right:0.25rem"></i> Organization</label>
                <input type="text" id="organization" name="organization" class="sk-input">
              </div>
              <div class="sk-form-group">
                <label class="sk-label"><i class="bi bi-briefcase-fill" style="color:var(--sk-primary);margin-right:0.25rem"></i> Designation</label>
                <input type="text" id="designation" name="designation" class="sk-input">
              </div>
              <div class="sk-form-group">
                <label class="sk-label"><i class="bi bi-image" style="color:var(--sk-primary);margin-right:0.25rem"></i> Profile Image</label>
                <input type="file" id="profile_image" name="profile_image" accept="image/*" class="sk-input" style="padding:0.5rem">
              </div>
            </div>

            <div class="sk-form-group" style="margin-top:1.25rem">
              <label class="sk-label"><i class="bi bi-chat-quote-fill" style="color:var(--sk-primary);margin-right:0.25rem"></i> Bio</label>
              <textarea id="bio" name="bio" rows="4" placeholder="Tell us a little about yourself..." class="sk-textarea"></textarea>
            </div>

            <!-- Message -->
            <div id="message" style="display:none;padding:0.75rem 1rem;border-radius:var(--sk-radius-lg);font-size:var(--sk-text-sm);margin-top:1rem"></div>

            <!-- Submit -->
            <div style="display:flex;flex-wrap:wrap;gap:1rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--sk-border)">
              <button type="submit" class="sk-btn sk-btn-gradient" style="flex:1;min-width:200px;padding:0.75rem">
                <i class="bi bi-check2-circle"></i> Save Changes
              </button>
              <a href="home.html" class="sk-btn sk-btn-secondary" style="flex:1;min-width:200px;padding:0.75rem;text-align:center;text-decoration:none">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
              </a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="sk-bottom-nav"><div class="sk-bottom-nav-items"></div></nav>
  </div>

  <script src="../static/js/api-config.js"></script>
  <script src="../static/js/utils.js"></script>
  <script src="../static/js/theme.js?v=ui-fix-30"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/layout.js?v=ui-fix-30"></script>
  <script>
    // Auth check and layout init
    SKLayout.init({
      page: 'profile',
      requireAuth: true,
      type: 'dashboard',
      onReady: () => loadProfile()
    });

    async function loadProfile() {
      try {
        const response = await apiRequest(API_ENDPOINTS.USER_DETAILS);
        const data = await response.json();
        if (response.ok) {
          document.getElementById('username').value = data.user_username || '';
          document.getElementById('email').value = data.user_email || '';
          document.getElementById('phone_number').value = data.phone_number || '';
          document.getElementById('organization').value = data.organization || '';
          document.getElementById('designation').value = data.designation || '';
          document.getElementById('bio').value = data.bio || '';

          document.getElementById('displayName').textContent = data.user_username || 'User';
          document.getElementById('displayEmail').innerHTML = `<i class="bi bi-envelope"></i> ${SKUtils.escapeHtml(data.user_email || '')}`;
          if (data.designation) {
            document.getElementById('displayDesignation').innerHTML = `<span style="color:var(--sk-text-placeholder)">•</span> <i class="bi bi-briefcase"></i> ${SKUtils.escapeHtml(data.designation)}`;
          }
          if (data.organization) {
            document.getElementById('displayOrganization').innerHTML = `<span style="color:var(--sk-text-placeholder)">•</span> <i class="bi bi-building"></i> ${SKUtils.escapeHtml(data.organization)}`;
          }
          document.getElementById('profileImage').src = resolveProfileImage(data.profile_image_url || data.profile_image);
        } else {
          throw new Error(data.detail || 'Failed to load profile');
        }
      } catch (error) {
        console.error('Profile Load Error:', error);
        showMessage('Failed to load profile. Please clear cache and login again.', 'error');
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData();
      formData.append('username', document.getElementById('username').value);
      formData.append('email', document.getElementById('email').value);
      formData.append('phone_number', document.getElementById('phone_number').value);
      formData.append('organization', document.getElementById('organization').value);
      formData.append('designation', document.getElementById('designation').value);
      formData.append('bio', document.getElementById('bio').value);
      const fileInput = document.getElementById('profile_image');
      if (fileInput.files.length > 0) formData.append('profile_image', fileInput.files[0]);

      try {
        const token = localStorage.getItem('access_token');
        const response = await fetch(API_ENDPOINTS.UPDATE_USER_DETAILS, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const data = await response.json();
        if (response.ok) {
          showMessage('Profile updated successfully!', 'success');
          SKLayout.clearUserCache();
          setTimeout(() => window.location.reload(), 1500);
        } else {
          const errors = Object.values(data).flat().join(', ');
          showMessage(errors || 'Failed to update profile', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        showMessage('Failed to update profile. Please try again.', 'error');
      }
    });

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.style.display = 'block';
      msg.style.background = type === 'success' ? 'var(--sk-success-bg)' : 'var(--sk-error-bg)';
      msg.style.color = type === 'success' ? 'var(--sk-success)' : 'var(--sk-error)';
      setTimeout(() => { msg.style.display = 'none'; }, 5000);
    }
  </script>
</body>
</html>
