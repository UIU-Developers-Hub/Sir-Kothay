<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Sir Kothay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .hover-scale { transition: transform 0.2s ease-in-out; }
    .hover-scale:hover { transform: scale(1.02); }
  </style>
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="fixed bottom-0 left-0 right-0 md:top-0 md:bottom-auto z-50 bg-white/80 backdrop-blur-lg border-t md:border-b border-gray-200/50">
    <div class="max-w-5xl mx-auto">
      <div class="hidden md:flex items-center justify-between px-8 py-4">
        <a href="../index.html" class="flex items-center gap-3">
          <img src="../static/images/nav-logo.png" class="h-10 rounded-lg bg-[#f68b1f] p-0.5 shadow-md object-contain" alt="Logo" />
        </a>
        <div class="flex items-center gap-6 text-sm font-medium">
          <a href="admin.html" class="text-orange-600 font-bold">Admin Panel</a>
          <a href="#" onclick="logout()" class="text-red-600 hover:text-red-700">Logout</a>
        </div>
      </div>
      <div class="md:hidden">
        <div class="flex items-center justify-around py-3 bg-white border-t border-gray-200">
          <a href="admin.html" class="flex flex-col items-center gap-1 px-3 py-2 rounded-xl transition bg-orange-50" style="color: #f68b1f;"><i class="bi bi-shield-lock-fill text-2xl"></i><span class="text-xs font-medium">Admin</span></a>
          <a href="#" onclick="logout()" class="flex flex-col items-center gap-1 px-3 py-2 rounded-xl text-red-600 hover:bg-red-50 transition"><i class="bi bi-box-arrow-right text-2xl"></i><span class="text-xs font-medium">Logout</span></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-0 md:pt-24 pb-20 md:pb-0 min-h-screen">
  <div class="bg-gray-100 relative pt-4 min-h-screen">
    <div id="loadingState" class="flex justify-center items-center min-h-screen">
      <div class="text-center"><div class="animate-spin rounded-full h-16 w-16 border-b-2 border-orange-600 mx-auto"></div><p class="mt-4 text-gray-600">Loading admin panel...</p></div>
    </div>

    <div id="mainContent" class="hidden">
      <!-- Admin Header Section -->
      <section class="max-w-6xl mx-auto bg-gradient-to-r from-gray-800 to-gray-900 p-6 rounded-xl shadow-lg border border-gray-700 mb-6 text-white">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-2xl lg:text-3xl font-bold mb-1"><i class="bi bi-shield-lock mr-2"></i>Admin Dashboard</h1>
            <p class="text-gray-400 text-sm">Manage system users, roles, and status.</p>
          </div>
          <div class="bg-gray-700 p-3 rounded-lg text-center shadow-inner">
            <p class="text-xs text-gray-400 uppercase tracking-widest">Total Users</p>
            <p id="totalUsersCount" class="text-3xl font-bold text-orange-400">0</p>
          </div>
        </div>
      </section>

      <!-- Users Table Section -->
      <section class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6 relative">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-bold text-gray-800">User Management</h2>
          <input type="text" id="adminSearch" placeholder="Search users..." class="border border-gray-300 p-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" onkeyup="renderAdminUsers()">
        </div>
        
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 border-b">
                <th class="p-3 text-sm font-semibold text-gray-600">ID</th>
                <th class="p-3 text-sm font-semibold text-gray-600">Name</th>
                <th class="p-3 text-sm font-semibold text-gray-600">Email</th>
                <th class="p-3 text-sm font-semibold text-gray-600">Role</th>
                <th class="p-3 text-sm font-semibold text-gray-600">Status</th>
                <th class="p-3 text-sm font-semibold text-gray-600 text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="adminUsersTable" class="divide-y divide-gray-100 text-sm">
              <!-- JS Populates this -->
            </tbody>
          </table>
          <p id="emptyTableMessage" class="hidden text-center py-8 text-gray-500">No users found.</p>
        </div>
      </section>
    </div>
  </div>
  </main>

  <footer class="py-12 px-6 mt-4 mb-20 md:mb-0 bg-gray-900 text-gray-300">
    <div class="max-w-7xl mx-auto text-center">
      <p>© 2026 Sir Kothay. Made with ❤️ by UIU Developers Hub</p>
    </div>
  </footer>

<script src="../static/js/api-config.js"></script>
<script src="../static/js/notify-modal.js"></script>
<script src="../static/js/admin-dashboard.js"></script>
</body>
</html>
