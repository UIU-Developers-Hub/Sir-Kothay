<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../static/images/nav-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign Up - Sir Kothay</title>
  <meta name="description" content="Create your Sir Kothay account - Leave notes when you're away">
  <link rel="stylesheet" href="../static/css/style.css?v=ui-fix-30">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .sk-role-option {
      cursor: pointer;
      transition: all 200ms ease;
      border: 2px solid var(--sk-border);
      border-radius: var(--sk-radius-xl);
      padding: 1rem;
      text-align: center;
      flex: 1;
    }
    .sk-role-option:hover { border-color: var(--sk-primary-muted); background: var(--sk-primary-light); }
    .sk-role-option.selected {
      border-color: var(--sk-primary);
      background: var(--sk-primary-light);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
    }
    .sk-role-option .role-icon {
      font-size: 1.75rem;
      display: block;
      margin-bottom: 0.5rem;
      color: var(--sk-text-tertiary);
    }
    .sk-role-option.selected .role-icon { color: var(--sk-primary); }
    .sk-role-option .role-label {
      font-weight: 600;
      font-size: var(--sk-text-sm);
      color: var(--sk-text-secondary);
    }
    .sk-role-option.selected .role-label { color: var(--sk-primary); }
    .sk-student-fields {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 300ms ease, opacity 200ms ease, margin 200ms ease;
      margin-bottom: 0;
    }
    .sk-student-fields.show {
      max-height: 100px; opacity: 1; margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="sk-app">
    <!-- Sidebar is injected by JS (layout.js) unconditionally -->

    <!-- Main Content -->
    <main class="sk-main">
      <div class="sk-page" style="padding-top: 0">
        <div class="sk-auth-page">
    <div class="sk-auth-blob sk-auth-blob-1"></div>
    <div class="sk-auth-blob sk-auth-blob-2"></div>

    <div class="sk-auth-card sk-fade-up" style="max-width:480px">

      <h1 class="sk-auth-title">Create Account</h1>
      <p class="sk-auth-subtitle">Join Sir Kothay today</p>

      <!-- Message -->
      <div id="message" style="display:none;padding:0.75rem 1rem;border-radius:var(--sk-radius-lg);font-size:var(--sk-text-sm);margin-bottom:1.5rem;animation:sk-fade-in 200ms ease"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <!-- Role Selection -->
        <div class="sk-form-group">
          <label class="sk-label">I am a</label>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
            <div class="sk-role-option selected" id="roleFaculty" onclick="selectRole('FACULTY')">
              <i class="bi bi-person-workspace role-icon"></i>
              <span class="role-label">Faculty</span>
            </div>
            <div class="sk-role-option" id="roleStudent" onclick="selectRole('STUDENT')">
              <i class="bi bi-mortarboard role-icon"></i>
              <span class="role-label">Student</span>
            </div>
          </div>
          <input type="hidden" id="role" value="FACULTY">
        </div>

        <!-- Full Name -->
        <div class="sk-form-group">
          <label class="sk-label" for="username">Full Name</label>
          <input type="text" id="username" class="sk-input" placeholder="Enter your full name" required>
        </div>

        <!-- Student ID (conditional) -->
        <div class="sk-student-fields" id="studentFields">
          <label class="sk-label" for="student_id">Student ID</label>
          <input type="text" id="student_id" class="sk-input" placeholder="e.g., 011 221 234">
        </div>

        <!-- Email -->
        <div class="sk-form-group">
          <label class="sk-label" for="email">Email</label>
          <input type="email" id="email" class="sk-input" placeholder="Enter your email" required autocomplete="email">
        </div>

        <!-- Password -->
        <div class="sk-form-group">
          <label class="sk-label" for="password">Password</label>
          <div style="position:relative">
            <input type="password" id="password" class="sk-input" placeholder="Create a password" required style="padding-right:2.75rem">
            <button type="button" onclick="togglePwd('password','pwdIcon1')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sk-text-placeholder);cursor:pointer;padding:4px;font-size:1.125rem">
              <i class="bi bi-eye" id="pwdIcon1"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="sk-form-group">
          <label class="sk-label" for="password2">Confirm Password</label>
          <div style="position:relative">
            <input type="password" id="password2" class="sk-input" placeholder="Confirm your password" required style="padding-right:2.75rem">
            <button type="button" onclick="togglePwd('password2','pwdIcon2')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sk-text-placeholder);cursor:pointer;padding:4px;font-size:1.125rem">
              <i class="bi bi-eye" id="pwdIcon2"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="sk-btn sk-btn-gradient" style="width:100%;padding:0.75rem;font-size:var(--sk-text-base);margin-top:0.5rem">
          <span id="btnText">Create Account</span>
          <i class="bi bi-arrow-right"></i>
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:var(--sk-text-sm);color:var(--sk-text-tertiary)">
        Already have an account?
        <a href="login.html" style="color:var(--sk-primary);font-weight:600">Sign In</a>
      </p>

    </div>
        </div>
      </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="sk-bottom-nav">
      <div class="sk-bottom-nav-items">
        <!-- Injected by JS -->
      </div>
    </nav>
  </div>

  <script src="../static/js/api-config.js"></script>
  <script src="../static/js/utils.js"></script>
  <script src="../static/js/theme.js?v=ui-fix-30"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/layout.js?v=ui-fix-30"></script>
  <script>
    SKLayout.setupPublicNav && SKLayout.setupPublicNav('register');

    let selectedRole = 'FACULTY';

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('role').value = role;
      document.getElementById('roleFaculty').classList.toggle('selected', role === 'FACULTY');
      document.getElementById('roleStudent').classList.toggle('selected', role === 'STUDENT');

      const studentFields = document.getElementById('studentFields');
      const studentIdInput = document.getElementById('student_id');
      if (role === 'STUDENT') {
        studentFields.classList.add('show');
        studentIdInput.required = true;
      } else {
        studentFields.classList.remove('show');
        studentIdInput.required = false;
        studentIdInput.value = '';
      }
    }

    function togglePwd(fieldId, iconId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(iconId);
      if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    function showMessage(text, isError = true) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.style.display = 'block';
      msg.style.background = isError ? 'var(--sk-error-bg)' : 'var(--sk-success-bg)';
      msg.style.color = isError ? 'var(--sk-error)' : 'var(--sk-success)';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const msgDiv = document.getElementById('message');
      msgDiv.style.display = 'none';

      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (password !== password2) {
        showMessage('Passwords do not match');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Creating account...';

      const body = {
        role: selectedRole,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: password,
        password2: password2
      };

      if (selectedRole === 'STUDENT') {
        body.student_id = document.getElementById('student_id').value;
      }

      try {
        // First, check if email/student_id already exists
        const checkBody = { email: body.email };
        if (body.student_id) checkBody.student_id = body.student_id;
        
        const checkRes = await fetch(API_BASE_URL + '/api/auth/users/check_existence/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(checkBody)
        });
        
        if (!checkRes.ok) {
          const checkData = await checkRes.json();
          let errorMsg = Object.values(checkData)[0];
          showMessage(errorMsg || 'A conflict occurred. This account might already exist.');
          btn.disabled = false;
          btnText.textContent = 'Create Account';
          return;
        }

        const res = await fetch(API_ENDPOINTS.REGISTER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (res.ok || res.status === 201) {
          showMessage('Account created successfully! Redirecting...', false);
          
          // Auto-login to handle the verification gate
          if (data.tokens) {
            localStorage.setItem('access_token', data.tokens.access);
            localStorage.setItem('refresh_token', data.tokens.refresh);
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.removeItem('sk_otp_expires_at');
          }
          
          setTimeout(() => { window.location.href = 'verify-email.html'; }, 2000);
        } else {
          let errorMsg = '';
          if (typeof data === 'object') {
            errorMsg = Object.entries(data)
              .map(([k, v]) => Array.isArray(v) ? v.join(', ') : String(v))
              .join('. ');
          } else {
            errorMsg = String(data).slice(0, 300);
          }
          showMessage(errorMsg || 'Registration failed');
        }
      } catch (err) {
        if (err.message && err.message.includes('Failed to fetch')) {
          showMessage('Cannot connect to the server. Please make sure the backend is running.');
        } else {
          showMessage('Network error. Please try again.');
        }
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
