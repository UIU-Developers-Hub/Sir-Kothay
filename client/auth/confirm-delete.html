<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../static/images/nav-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Confirm Account Deletion - Sir Kothay</title>
  <link rel="stylesheet" href="../static/css/style.css?v=nav-skeleton-1">
  <link rel="stylesheet" href="../static/css/components.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="../static/js/theme.js?v=live-status-2"></script>
</head>
<body>
  <div class="sk-app">
    <main class="sk-main sk-ex-78280fab">
      <div class="sk-auth-page sk-ex-16000cc0">
        <div class="sk-auth-blob sk-auth-blob-1"></div>
        <div class="sk-auth-blob sk-auth-blob-2"></div>

        <div class="sk-auth-card sk-fade-up sk-ex-ac9347a1">
          <div class="sk-ex-3c7b6203">
            <i class="bi bi-shield-exclamation sk-ex-ee824a81" style="color:var(--clr-danger,#ef4444)"></i>
          </div>
          <h1 class="sk-auth-title sk-ex-65f9d5a3">Confirm Account Deletion</h1>
          <p class="sk-auth-subtitle sk-ex-0e103e40" id="subtitleText">
            Verifying your deletion link...
          </p>

          <div id="message" class="sk-ex-6f0f67d9"></div>

          <!-- Loading spinner -->
          <div id="tokenLoading" class="sk-ex-02998ca1">
            <div class="sk-spinner sk-spinner-md sk-ex-cb0164b4"></div>
            <p class="sk-ex-40ca2e4b">Verifying your link...</p>
          </div>

          <!-- Final Confirmation (shown after link verified) -->
          <div id="confirmSection" style="display:none">
            <div style="text-align:center;margin:1.5rem 0">
              <i class="bi bi-exclamation-triangle-fill" style="font-size:2.5rem;color:var(--clr-danger,#ef4444)"></i>
            </div>
            <p id="confirmText" style="text-align:center;color:var(--clr-text-muted,#999);margin-bottom:1.5rem;font-size:.95rem">
              Are you absolutely sure you want to permanently delete your account? This action cannot be undone.
            </p>
            <div style="display:flex;gap:.75rem">
              <button type="button" class="sk-btn sk-btn-secondary" style="flex:1" onclick="cancelDeletion()">
                <i class="bi bi-x-lg me-1"></i> No, keep it
              </button>
              <button type="button" id="yesDeleteBtn" class="sk-btn sk-btn-danger" style="flex:1" onclick="confirmDeletion()">
                <i class="bi bi-trash3 me-1"></i> Yes, delete
              </button>
            </div>
          </div>

          <!-- Cancelled / Success states -->
          <div id="cancelledSection" style="display:none;text-align:center">
            <i class="bi bi-check-circle" style="font-size:2.5rem;color:var(--sk-success,#22c55e)"></i>
            <p style="margin-top:1rem;color:var(--clr-text-muted,#999)">Account deletion cancelled. Your account is safe.</p>
            <a href="login.html" class="sk-btn sk-btn-primary" style="margin-top:1rem;display:inline-block">
              <i class="bi bi-box-arrow-in-right me-1"></i> Go to Login
            </a>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="../static/js/api-config.js?v=backend-sync-1"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/utils.js"></script>
  <script src="../static/js/layout.js?v=nav-skeleton-1"></script>
  <script>
    let deletionToken = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await SKLayout.setupPublicNav('login');

      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        showMessage('No deletion token provided. This link may be invalid.');
        document.getElementById('tokenLoading').style.display = 'none';
        return;
      }

      deletionToken = token;
      await verifyToken(token);
    });

    function showMessage(text, isError = true) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.style.display = 'block';
      msg.style.background = isError ? 'var(--sk-error-bg)' : 'var(--sk-success-bg)';
      msg.style.color = isError ? 'var(--sk-error)' : 'var(--sk-success)';
    }

    async function verifyToken(token) {
      try {
        const res = await fetch(API_ENDPOINTS.VERIFY_DELETION_LINK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        const data = await res.json();
        document.getElementById('tokenLoading').style.display = 'none';

        if (res.ok) {
          document.getElementById('subtitleText').textContent =
            `You are about to delete the account for ${data.username} (${data.email}).`;
          document.getElementById('confirmSection').style.display = '';
        } else {
          showMessage(data.error || 'Invalid or expired deletion link.');
        }
      } catch (err) {
        document.getElementById('tokenLoading').style.display = 'none';
        showMessage('Network error. Please try again.');
      }
    }

    async function confirmDeletion() {
      const btn = document.getElementById('yesDeleteBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="sk-spinner sk-spinner-sm me-2"></span> Deleting...';

      try {
        const res = await fetch(API_ENDPOINTS.CONFIRM_DELETE_BY_LINK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: deletionToken })
        });

        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          // Clear any local session data
          localStorage.clear();
          document.getElementById('confirmSection').style.display = 'none';
          document.getElementById('subtitleText').style.display = 'none';
          showMessage('Your account has been permanently deleted. Redirecting...', false);
          setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        } else {
          showMessage(data.error || 'Failed to delete account.');
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-trash3 me-1"></i> Yes, delete';
        }
      } catch (err) {
        showMessage('Network error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-trash3 me-1"></i> Yes, delete';
      }
    }

    function cancelDeletion() {
      document.getElementById('confirmSection').style.display = 'none';
      document.getElementById('subtitleText').style.display = 'none';
      document.getElementById('cancelledSection').style.display = '';
    }
  </script>
</body>
</html>
