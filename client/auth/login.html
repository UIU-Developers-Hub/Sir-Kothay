<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../static/images/nav-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - Sir Kothay</title>
  <meta name="description" content="Sign in to Sir Kothay - Leave notes when you're away">
  <link rel="stylesheet" href="../static/css/style.css?v=nav-skeleton-1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="sk-app">
    <!-- Sidebar is injected by JS (layout.js) unconditionally -->

    <!-- Main Content -->
    <main class="sk-main">
      <div class="sk-page" style="padding-top: 0">
        <div class="sk-auth-page">
    <!-- Decorative blobs -->
    <div class="sk-auth-blob sk-auth-blob-1"></div>
    <div class="sk-auth-blob sk-auth-blob-2"></div>

    <div class="sk-auth-card sk-fade-up">

      <h1 class="sk-auth-title">Welcome Back</h1>
      <p class="sk-auth-subtitle">Sign in to your account</p>

      <!-- Error Message -->
      <div id="errorMessage" style="display:none;padding:0.75rem 1rem;border-radius:var(--sk-radius-lg);background:var(--sk-error-bg);color:var(--sk-error);font-size:var(--sk-text-sm);margin-bottom:1.5rem;animation:sk-fade-in 200ms ease">
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="sk-form-group">
          <label class="sk-label" for="email">Email</label>
          <input type="email" id="email" class="sk-input" placeholder="Enter your email" required autocomplete="email">
        </div>

        <div class="sk-form-group">
          <div style="display:flex; justify-content:space-between; align-items:baseline">
            <label class="sk-label" for="password">Password</label>
            <a href="forgot-password.html" style="font-size:var(--sk-text-sm); color:var(--sk-primary); font-weight:500;">Forgot Password?</a>
          </div>
          <div style="position:relative">
            <input type="password" id="password" class="sk-input" placeholder="Enter your password" required autocomplete="current-password" style="padding-right:2.75rem">
            <button type="button" onclick="togglePassword()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sk-text-placeholder);cursor:pointer;padding:4px;font-size:1.125rem">
              <i class="bi bi-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="sk-btn sk-btn-gradient" style="width:100%;padding:0.75rem;font-size:var(--sk-text-base);margin-top:0.5rem">
          <span id="btnText">Sign In</span>
          <i class="bi bi-arrow-right"></i>
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:var(--sk-text-sm);color:var(--sk-text-tertiary)">
        Don't have an account?
        <a href="register.html" style="color:var(--sk-primary);font-weight:600">Sign Up</a>
      </p>

    </div>
        </div>
      </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="sk-bottom-nav">
      <div class="sk-bottom-nav-items">
        <!-- Injected by JS -->
      </div>
    </nav>
  </div>

  <script src="../static/js/api-config.js?v=backend-sync-1"></script>
  <script src="../static/js/utils.js"></script>
  <script src="../static/js/theme.js?v=live-status-2"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/layout.js?v=nav-skeleton-1"></script>
  <script>
    SKLayout.setupPublicNav && SKLayout.setupPublicNav('login');

    // Redirect if already logged in
    if (localStorage.getItem('access_token')) {
      window.location.href = '../dashboard/home.html';
    }

    function togglePassword() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('errorMessage');
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');

      errorDiv.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = 'Signing in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(API_ENDPOINTS.LOGIN, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('access_token', data.tokens.access);
          localStorage.setItem('refresh_token', data.tokens.refresh);
          if (data.user) {
            localStorage.setItem('user', JSON.stringify(data.user));
          }
          localStorage.removeItem('sk_otp_expires_at');

          if (data.user && data.user.is_email_verified === false) {
            window.location.href = 'verify-email.html';
            return;
          }

          // Role-based redirect
          const role = data.user?.role || data.role || '';
          if (role === 'STUDENT') {
            window.location.href = '../dashboard/student.html';
          } else if (!role && data.user?.is_staff) {
            window.location.href = '../dashboard/admin.html';
          } else {
            window.location.href = '../dashboard/home.html';
          }
        } else {
          const msg = data.detail || data.error || data.message || Object.values(data).flat().join(', ') || 'Login failed';
          errorDiv.textContent = msg;
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Network error. Please check your connection.';
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
