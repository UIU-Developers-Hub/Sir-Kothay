<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../static/images/nav-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forgot Password - Sir Kothay</title>
  <meta name="description" content="Reset your password for Sir Kothay">
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/components.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="sk-app">
    <!-- Main Content -->
    <main class="sk-main" style="padding-left: 0; display:flex; justify-content:center; align-items:center; min-height:100vh;">
      <div class="sk-auth-page" style="width:100%; max-width:500px; padding:2rem;">
        
        <!-- Decorative blobs -->
        <div class="sk-auth-blob sk-auth-blob-1"></div>
        <div class="sk-auth-blob sk-auth-blob-2"></div>

        <div class="sk-auth-card sk-fade-up">

          <h1 class="sk-auth-title">Reset Password</h1>
          <p class="sk-auth-subtitle">Enter your email and we'll send you a link to reset your password.</p>

          <div id="messageBox" style="display:none;padding:0.75rem 1rem;border-radius:var(--sk-radius-lg);font-size:var(--sk-text-sm);margin-bottom:1.5rem;animation:sk-fade-in 200ms ease">
          </div>

          <!-- Reset Form -->
          <form id="resetForm" onsubmit="handleReset(event)">
            <div class="sk-form-group">
              <label class="sk-label" for="email">Email Address</label>
              <input type="email" id="email" class="sk-input" placeholder="Enter your email" required autocomplete="email">
            </div>

            <button type="submit" id="submitBtn" class="sk-btn sk-btn-primary" style="width:100%;padding:0.75rem;font-size:var(--sk-text-base);margin-top:0.5rem">
              <span id="btnText">Send Reset Link</span>
              <i class="bi bi-envelope"></i>
            </button>
          </form>

          <p style="text-align:center;margin-top:1.5rem;font-size:var(--sk-text-sm);color:var(--sk-text-tertiary)">
            Remembered your password?
            <a href="login.html" style="color:var(--sk-primary);font-weight:600">Back to Login</a>
          </p>

        </div>
      </div>
    </main>
  </div>

  <script src="../static/js/api-config.js"></script>
  <script src="../static/js/utils.js"></script>
  <script src="../static/js/theme.js"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/layout.js"></script>
  <script>
    SKLayout.setupPublicNav && SKLayout.setupPublicNav('login');

    async function handleReset(e) {
      e.preventDefault();
      const msgBox = document.getElementById('messageBox');
      const submitBtn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value.trim();

      msgBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="sk-spinner sk-spinner-sm me-2"></span> Sending...';

      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/users/request_password_reset/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          msgBox.textContent = 'If that email exists in our system, a reset link has been sent.';
          msgBox.style.background = 'var(--sk-success-bg)';
          msgBox.style.color = 'var(--sk-success)';
          msgBox.style.display = 'block';
          document.getElementById('email').value = '';
        } else {
          msgBox.textContent = data.error || 'Failed to request reset.';
          msgBox.style.background = 'var(--sk-error-bg)';
          msgBox.style.color = 'var(--sk-error)';
          msgBox.style.display = 'block';
        }
      } catch (err) {
        msgBox.textContent = 'A network error occurred. Please try again.';
        msgBox.style.background = 'var(--sk-error-bg)';
        msgBox.style.color = 'var(--sk-error)';
        msgBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span id="btnText">Send Reset Link</span><i class="bi bi-envelope"></i>';
      }
    }
  </script>
</body>
</html>
