<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../static/images/nav-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Set New Password - Sir Kothay</title>
  <meta name="description" content="Set a new password for Sir Kothay">
  <link rel="stylesheet" href="../static/css/style.css?v=nav-skeleton-1">
  <link rel="stylesheet" href="../static/css/components.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="sk-app">
    <!-- Main Content -->
    <main class="sk-main sk-ex-eb4e9e0a">
      <div class="sk-auth-page sk-ex-de3d25d6">
        
        <!-- Decorative blobs -->
        <div class="sk-auth-blob sk-auth-blob-1"></div>
        <div class="sk-auth-blob sk-auth-blob-2"></div>

        <div class="sk-auth-card sk-fade-up">

          <h1 class="sk-auth-title">Set New Password</h1>
          <p class="sk-auth-subtitle">Please enter your new password below.</p>

          <div id="messageBox" class="sk-ex-50be5b2c">
          </div>

          <!-- Reset Form -->
          <form id="resetForm" onsubmit="handleReset(event)">
            <div class="sk-form-group">
              <label class="sk-label" for="password">New Password</label>
              <div class="sk-ex-d461c96d">
                <input type="password" id="password" class="sk-input sk-ex-11780b84" placeholder="Enter new password" required>
                <button type="button" onclick="togglePassword()" aria-label="Show password" title="Show password" class="sk-ex-a7bb75c2">
                  <i class="bi bi-eye" id="toggleIcon"></i>
                </button>
              </div>
            </div>

            <div class="sk-form-group">
              <label class="sk-label" for="confirm_password">Confirm Password</label>
              <div class="sk-ex-d461c96d">
                <input type="password" id="confirm_password" class="sk-input sk-ex-11780b84" placeholder="Confirm new password" required>
                <button type="button" onclick="toggleConfirmPassword()" aria-label="Show confirmed password" title="Show confirmed password" class="sk-ex-a7bb75c2">
                  <i class="bi bi-eye" id="toggleConfirmIcon"></i>
                </button>
              </div>
            </div>

            <button type="submit" id="submitBtn" class="sk-btn sk-btn-primary sk-ex-3ce974d8">
              <span id="btnText">Save Password</span>
              <i class="bi bi-check-circle"></i>
            </button>
          </form>
          
          <div id="successActions" class="sk-ex-99041d54">
            <a href="login.html" class="sk-btn sk-btn-primary sk-ex-9e58dee7">Go to Login</a>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="../static/js/api-config.js?v=backend-sync-1"></script>
  <script src="../static/js/utils.js"></script>
  <script src="../static/js/theme.js?v=live-status-2"></script>
  <script src="../static/js/components.js"></script>
  <script src="../static/js/layout.js?v=nav-skeleton-1"></script>
  <script>
    SKLayout.setupPublicNav && SKLayout.setupPublicNav('login');

    function togglePassword() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    function toggleConfirmPassword() {
      const pwd = document.getElementById('confirm_password');
      const icon = document.getElementById('toggleConfirmIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    async function handleReset(e) {
      e.preventDefault();
      const msgBox = document.getElementById('messageBox');
      const submitBtn = document.getElementById('submitBtn');
      const new_password = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm_password').value;

      if (new_password !== confirm_password) {
        msgBox.textContent = 'Passwords do not match.';
        msgBox.style.background = 'var(--sk-error-bg)';
        msgBox.style.color = 'var(--sk-error)';
        msgBox.style.display = 'block';
        return;
      }

      // Extract uidb64 and token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const uidb64 = urlParams.get('uidb64');
      const token = urlParams.get('token');

      if (!uidb64 || !token) {
        msgBox.textContent = 'Invalid or missing password reset link.';
        msgBox.style.background = 'var(--sk-error-bg)';
        msgBox.style.color = 'var(--sk-error)';
        msgBox.style.display = 'block';
        return;
      }

      msgBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="sk-spinner sk-spinner-sm me-2"></span> Saving...';

      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/users/confirm_password_reset/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uidb64, token, new_password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          msgBox.textContent = 'Your password has been reset successfully.';
          msgBox.style.background = 'var(--sk-success-bg)';
          msgBox.style.color = 'var(--sk-success)';
          msgBox.style.display = 'block';
          
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('successActions').style.display = 'block';
        } else {
          msgBox.textContent = data.error || 'Failed to reset password. The link might be expired.';
          msgBox.style.background = 'var(--sk-error-bg)';
          msgBox.style.color = 'var(--sk-error)';
          msgBox.style.display = 'block';
          
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span id="btnText">Save Password</span><i class="bi bi-check-circle"></i>';
        }
      } catch (err) {
        msgBox.textContent = 'A network error occurred. Please try again.';
        msgBox.style.background = 'var(--sk-error-bg)';
        msgBox.style.color = 'var(--sk-error)';
        msgBox.style.display = 'block';
        
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span id="btnText">Save Password</span><i class="bi bi-check-circle"></i>';
      }
    }
  </script>
</body>
</html>
