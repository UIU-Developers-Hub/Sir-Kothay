<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="../static/images/nav-logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Manage Notifications - Sir Kothay</title>
    <meta name="description" content="Sir Kothay - Manage your subscriptions and direct messages.">
    <link rel="stylesheet" href="../static/css/style.css?v=frosted-broadcast-2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body class="sk-broadcast-page">
    <div class="sk-app">
      <!-- Sidebar is injected by JS (layout.js) -->
      
      <main class="sk-main">
        <div class="sk-page sk-ex-eae290ea">
          <div class="sk-auth-page">
            <div class="sk-auth-blob sk-auth-blob-1"></div>
            <div class="sk-auth-blob sk-auth-blob-2"></div>
            
            <div id="manageSkeleton" class="sk-auth-card sk-fade-up sk-ex-6a9c8533 manage-loading-card" aria-hidden="true">
              <div class="manage-loading-logo">
                <span class="sk-skeleton manage-loading-logo-mark"></span>
                <span class="sk-skeleton manage-loading-logo-text"></span>
              </div>
              <span class="sk-skeleton manage-loading-title"></span>
              <span class="sk-skeleton manage-loading-subtitle"></span>
              <div class="manage-loading-panel">
                <span class="sk-skeleton manage-loading-icon"></span>
                <span class="sk-skeleton manage-loading-copy"></span>
                <span class="sk-skeleton manage-loading-copy manage-loading-copy-short"></span>
              </div>
              <span class="sk-skeleton manage-loading-input"></span>
              <span class="sk-skeleton manage-loading-button"></span>
            </div>

            <div id="manageCard" class="sk-auth-card sk-fade-up sk-ex-6a9c8533 hidden">
              <div class="sk-auth-logo">
                <img src="../static/images/logo.png" alt="Sir Kothay">
                <span class="sk-auth-logo-text">Sir <span>Kothay?</span></span>
              </div>
              <h1 class="sk-auth-title sk-ex-81e4d4ba">Manage Settings</h1>
              <p id="userEmailHero" class="sk-auth-subtitle sk-ex-e7058847">Control your Sir Kothay interactions</p>

              <div id="manageBackendState" class="hidden"></div>

              <!-- Auth / Email Form -->
              <div id="emailView" class="hidden">
                <div class="sk-ex-3c7b6203">
                  <i class="bi bi-envelope-paper sk-ex-8e0d4910"></i>
                  <p class="sk-ex-76ebf0f7">
                    Enter your email to instantly view and manage your active subscriptions and messages.
                  </p>
                </div>
                <div class="sk-form-group">
                  <input type="email" id="emailInput" class="sk-input sk-ex-c2306338" placeholder="student@example.com" autofocus>
                </div>
                <button type="button" class="sk-btn sk-btn-primary sk-ex-44c2d40d" onclick="loadDataFromInput()">
                  Continue <i class="bi bi-arrow-right"></i>
                </button>
                <p id="emailResult" class="hidden sk-ex-9da71654"></p>
              </div>

              <!-- Management View -->
              <div id="manageView" class="hidden">
                
                <div class="sk-ex-e7058847">
                  <h2 class="sk-ex-e1a6f695">
                    <i class="bi bi-bell me-2"></i> Status Subscriptions
                  </h2>
                  <div id="subsList"></div>
                </div>

                <div class="sk-ex-e7058847">
                  <h2 class="sk-ex-e1a6f695">
                    <i class="bi bi-chat-dots me-2"></i> Direct Messages
                  </h2>
                  <div id="dmsList"></div>
                </div>

                <button type="button" class="sk-btn sk-btn-secondary sk-ex-3fc45a54" onclick="resetManageEmailView()">
                  <i class="bi bi-arrow-counterclockwise me-2"></i> Manage Different Email
                </button>

              </div>
            </div>

          </div>
        </div>
      </main>

      <!-- Mobile Bottom Nav -->
      <nav class="sk-bottom-nav">
        <div class="sk-bottom-nav-items">
          <!-- Injected by JS -->
        </div>
      </nav>
    </div>

    <script src="../static/js/api-config.js?v=backend-sync-1"></script>
    <script src="../static/js/utils.js"></script>
    <script src="../static/js/theme.js?v=live-status-2"></script>
    <script src="../static/js/components.js"></script>
    <script src="../static/js/layout.js?v=backend-state-1"></script>
    <script>
      // Initialize Layout
      document.addEventListener('DOMContentLoaded', () => {
        SKLayout.setupPublicNav('manage');
      });
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      initializeManagePage();

      window.addEventListener('sk:backend-restored', () => {
        initializeManagePage({ silent: true });
      });
      window.addEventListener('sk:backend-status', (event) => {
        if (event.detail && event.detail.status === 'offline') showManageBackendUnavailable();
      });

      async function initializeManagePage(options = {}) {
        const currentToken = new URLSearchParams(window.location.search).get('token');
        showManageLoading();
        document.getElementById('emailView').classList.add('hidden');
        document.getElementById('manageView').classList.add('hidden');
        document.getElementById('manageBackendState').classList.add('hidden');
        document.getElementById('userEmailHero').textContent = 'Control your Sir Kothay interactions';
        document.getElementById('userEmailHero').style.color = '';

        if (window.SKBackendStatus && SKBackendStatus.getState && SKBackendStatus.getState() === 'unknown' && SKBackendStatus.check) {
          await SKBackendStatus.check('manage-page-load');
        }
        if (window.SKBackendStatus && SKBackendStatus.getState && SKBackendStatus.getState() !== 'online') {
          showManageBackendUnavailable();
          return;
        }

        if (currentToken) {
          try {
            await loadData(null, currentToken);
            document.getElementById('manageView').classList.remove('hidden');
            showManageContent();
          } catch (e) {
            if (window.SKBackendStatus && SKBackendStatus.getState && SKBackendStatus.getState() !== 'online') {
              showManageBackendUnavailable();
              return;
            }
            document.getElementById('userEmailHero').textContent = 'Error loading settings: ' + e.message;
            document.getElementById('userEmailHero').style.color = 'var(--sk-error)';
            showManageContent();
          }
        } else {
          document.getElementById('emailView').classList.remove('hidden');
          showManageContent();
          if (!options.silent) document.getElementById('emailInput').focus();
        }
      }

      function showManageLoading() {
        const skeleton = document.getElementById('manageSkeleton');
        const card = document.getElementById('manageCard');
        if (skeleton) skeleton.classList.remove('hidden');
        if (card) card.classList.add('hidden');
      }

      function showManageContent() {
        const skeleton = document.getElementById('manageSkeleton');
        const card = document.getElementById('manageCard');
        if (skeleton) skeleton.classList.add('hidden');
        if (card) card.classList.remove('hidden');
      }

      function showManageBackendUnavailable() {
        if (window.SKBackendStatus && SKBackendStatus.markOffline && (!SKBackendStatus.getState || SKBackendStatus.getState() !== 'offline')) {
          SKBackendStatus.markOffline({ reason: 'manage-page' });
        }
        if (window.SKLayout && SKLayout.renderOfflineStaticNav) {
          SKLayout.renderOfflineStaticNav('home', { hideAuth: true });
        }
        const backendState = document.getElementById('manageBackendState');
        if (backendState && window.SKLayout && SKLayout.backendUnavailableStateHtml) {
          backendState.innerHTML = SKLayout.backendUnavailableStateHtml({
            subtitle: 'Sir Kothay will reconnect automatically.'
          });
        } else if (backendState) {
          backendState.innerHTML = '<div class="sk-empty-state compact">' +
            '<div class="sk-empty-icon"><i class="bi bi-wifi-off"></i></div>' +
            '<div class="sk-empty-title">Backend unavailable</div>' +
            '<div class="sk-empty-subtitle">Sir Kothay will reconnect automatically.</div>' +
            '<button type="button" class="sk-btn sk-btn-primary sk-btn-sm" onclick="SKLayout.retryBackend()">' +
            '<i class="bi bi-arrow-clockwise"></i> Retry</button>' +
            '</div>';
        }
        document.getElementById('emailView').classList.add('hidden');
        document.getElementById('manageView').classList.add('hidden');
        document.getElementById('manageBackendState').classList.remove('hidden');
        showManageContent();
      }

      function showToast(msg) {
        const toast = document.getElementById('skToast');
        if(!toast) return;
        document.getElementById('skToastMessage').textContent = msg;
        toast.style.display = 'flex';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      async function skFetch(path, options = {}) {
        const url = API_BASE_URL + path;
        options.headers = { ...options.headers, 'Content-Type': 'application/json' };
        const response = await fetch(url, options);
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || 'API request failed');
        }
        return response.json();
      }

      async function loadDataFromInput() {
        const email = document.getElementById('emailInput').value.trim();
        const el = document.getElementById('emailResult');
        if (!email) {
          el.textContent = 'Please enter an email address.';
          el.style.color = 'var(--sk-error)';
          el.classList.remove('hidden');
          return;
        }
        showManageLoading();
        document.getElementById('manageBackendState').classList.add('hidden');
        document.getElementById('emailView').classList.add('hidden');
        document.getElementById('manageView').classList.add('hidden');
        try {
          await loadData(email, null);
          document.getElementById('manageView').classList.remove('hidden');
          showManageContent();
        } catch (e) {
          if (window.SKBackendStatus && SKBackendStatus.getState && SKBackendStatus.getState() !== 'online') {
            showManageBackendUnavailable();
            return;
          }
          document.getElementById('emailView').classList.remove('hidden');
          el.textContent = e.message || 'An error occurred. Please try again.';
          el.style.color = 'var(--sk-error)';
          el.classList.remove('hidden');
          showManageContent();
        }
      }

      function resetManageEmailView() {
        document.getElementById('manageBackendState').classList.add('hidden');
        document.getElementById('manageView').classList.add('hidden');
        document.getElementById('emailView').classList.remove('hidden');
        showManageContent();
        document.getElementById('emailInput').value = '';
        const result = document.getElementById('emailResult');
        if (result) result.classList.add('hidden');
        window._currentEmail = null;
        window._currentToken = null;
        const url = new URL(window.location.href);
        url.searchParams.delete('token');
        history.replaceState(null, '', url);
      }

      async function loadData(email, tokenStr) {
        const payload = { action: 'fetch' };
        if (email) payload.email = email;
        if (tokenStr) payload.token = tokenStr;

        const res = await skFetch('/api/notifications/manage/', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        
        if (res) {
          document.getElementById('userEmailHero').textContent = res.email;
          window._currentEmail = res.email;
          window._currentToken = tokenStr;
          renderSubs(res.subscriptions);
          renderDms(res.messages);
        }
      }

      function renderSubs(subs) {
        const container = document.getElementById('subsList');
        container.innerHTML = '';
        if (!subs || subs.length === 0) {
          container.innerHTML = '<div class="empty-state"><i class="bi bi-bell-slash sk-ex-8040a32e"></i>No active subscriptions</div>';
          return;
        }
        subs.forEach(s => {
          const div = document.createElement('div');
          div.className = 'sk-item-row';
          
          let currentPref = s.is_active ? s.notify_preference : 'none';
          
          div.innerHTML = `
            <div class="sk-item-left">
              <div class="sk-item-icon"><i class="bi bi-person-badge"></i></div>
              <div class="sk-item-info">
                <span class="sk-item-title">Faculty</span>
                <span class="sk-item-subtitle">${s.faculty}</span>
              </div>
            </div>
            <div>
              <select class="sk-select sk-ex-fb92676f" aria-label="Notification preference" title="Notification preference" onchange="updateSubscription('${s.type}', ${s.id}, this.value)">
                <option value="all" ${currentPref === 'all' ? 'selected' : ''}>All Updates</option>
                <option value="available" ${currentPref === 'available' ? 'selected' : ''}>When Available</option>
                <option value="none" ${currentPref === 'none' ? 'selected' : ''}>No Updates</option>
              </select>
            </div>
          `;
          container.appendChild(div);
        });
      }

      function renderDms(dms) {
        const container = document.getElementById('dmsList');
        container.innerHTML = '';
        if (!dms || dms.length === 0) {
          container.innerHTML = '<div class="empty-state"><i class="bi bi-chat-square sk-ex-8040a32e"></i>No direct messages found.</div>';
          return;
        }
        dms.forEach(m => {
          const div = document.createElement('div');
          div.className = 'sk-item-row';
          
          const isOpen = m.allows_replies && !m.is_closed;
          const actionHtml = isOpen ?
            `<button type="button" class="sk-btn sk-btn-ghost sk-btn-sm sk-ex-dcca06c8" onclick="closeDM('${m.type}', ${m.id}, this)"><i class="bi bi-x-circle me-1"></i> Close</button>` :
            `<span class="sk-ex-33ab4df9">Closed</span>`;

          div.innerHTML = `
            <div class="sk-item-left">
              <div class="sk-item-icon"><i class="bi bi-envelope"></i></div>
              <div class="sk-item-info">
                <span class="sk-item-title">To: ${m.faculty}</span>
                <span class="sk-item-subtitle sk-ex-78a068d8">${m.subject || 'No Subject'}</span>
                <span class="sk-ex-aac5e2d3">Sent: ${new Date(m.created_at).toLocaleDateString()}</span>
              </div>
            </div>
            <div class="sk-ex-4270057a">
              ${actionHtml}
            </div>
          `;
          container.appendChild(div);
        });
      }

      async function updateSubscription(type, id, preference) {
        const payload = { action: 'update_sub', item_type: type, item_id: id, preference: preference };
        if (window._currentEmail) payload.email = window._currentEmail;
        if (window._currentToken) payload.token = window._currentToken;

        try {
          const res = await skFetch('/api/notifications/manage/', {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          if (res && res.status === 'ok') {
            SKComponents.toast('Subscription updated', 'success');
          }
        } catch (e) {
          SKComponents.toast('Failed to update subscription: ' + e.message, 'error');
        }
      }

      async function closeDM(type, id, btnElement) {
        const confirmed = await SKComponents.confirm('Are you sure you want to close this chat? This cannot be undone.', {
          title: 'Close Chat',
          confirmText: 'Close',
          danger: true
        });
        if (!confirmed) return;
        
        const payload = { action: 'close_dm', item_type: type, item_id: id };
        if (window._currentEmail) payload.email = window._currentEmail;
        if (window._currentToken) payload.token = window._currentToken;

        try {
          const res = await skFetch('/api/notifications/manage/', {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          if (res && res.status === 'ok') {
            SKComponents.toast('Chat closed successfully', 'success');
            // Refresh data
            loadData(window._currentEmail, window._currentToken);
          }
        } catch (e) {
          SKComponents.toast('Failed to close chat: ' + e.message, 'error');
        }
      }
    </script>
  </body>
</html>
