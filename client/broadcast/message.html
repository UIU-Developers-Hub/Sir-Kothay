<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Broadcast - Sir Kothay</title>
    <meta name="description" content="Sir Kothay - Faculty broadcast page. See availability and send messages.">
    <link rel="stylesheet" href="../static/css/style.css?v=ui-fix-14">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      /* Broadcast-specific styles */
      .bc-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--sk-bg-base);
        position: relative;
      }
      .bc-page::before {
        content: '';
        display: none;
      }
      .bc-page::after {
        content: '';
        display: none;
      }
      .bc-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        position: relative;
        z-index: 1;
      }
      .bc-card {
        width: 100%;
        max-width: 420px;
        background: var(--sk-card-bg);
        border: 1px solid var(--sk-card-border);
        border-radius: var(--sk-radius-xl);
        overflow: hidden;
        box-shadow: var(--sk-shadow-md);
        animation: sk-fade-in 220ms ease both;
      }
      .bc-hero {
        padding: 2rem 1.5rem;
        text-align: center;
        color: white;
        background: var(--sk-primary);
        position: relative;
        overflow: hidden;
      }
      .bc-hero::before {
        content: '';
        display: none;
      }
      .bc-hero::after {
        content: '';
        display: none;
      }
      .bc-avatar {
        width: 56px;
        height: 56px;
        border-radius: var(--sk-radius-lg);
        object-fit: cover;
        border: 2px solid rgba(255,255,255,0.5);
        margin: 0 auto 0.75rem;
        display: block;
        position: relative;
        z-index: 1;
      }
      .bc-name {
        font-size: var(--sk-text-xl);
        font-weight: var(--sk-font-bold);
        letter-spacing: -0.01em;
        position: relative;
        z-index: 1;
      }
      /* Broadcast message section */
      .bc-msg-section {
        padding: 1.25rem 1.5rem;
        background: var(--sk-primary-light);
        text-align: center;
      }
      .bc-msg-label {
        font-size: var(--sk-text-xs);
        font-weight: var(--sk-font-semibold);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--sk-primary-text);
        opacity: 0.7;
        margin-bottom: 0.75rem;
      }
      .bc-msg-panel {
        border-radius: var(--sk-radius-xl);
        padding: 1.25rem;
        border: 1px solid var(--sk-primary-muted);
        background: var(--sk-card-bg);
      }
      .bc-msg-panel:focus {
        outline: none;
      }
      .bc-msg-panel:focus-visible {
        box-shadow: 0 0 0 3px var(--sk-primary-muted);
      }
      .bc-toast {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 9999;
        padding: 0.625rem 0.875rem;
        background: var(--sk-bg-surface);
        border: 1px solid var(--sk-border);
        border-radius: var(--sk-radius-lg);
        box-shadow: var(--sk-shadow-sm);
        color: var(--sk-text-primary);
        font-size: var(--sk-text-sm);
      }
      .bc-msg-text {
        color: var(--sk-text-primary);
        font-weight: var(--sk-font-semibold);
        font-size: var(--sk-text-base);
        line-height: 1.6;
      }
      /* Info row */
      .bc-info-list {
        padding: 1.25rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .bc-info-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .bc-info-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .bc-info-icon {
        width: 40px;
        height: 40px;
        border-radius: var(--sk-radius-lg);
        background: var(--sk-primary-light);
        color: var(--sk-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.125rem;
        flex-shrink: 0;
      }
      .bc-info-label {
        font-size: var(--sk-text-xs);
        color: var(--sk-text-tertiary);
      }
      .bc-info-value {
        font-size: var(--sk-text-sm);
        font-weight: var(--sk-font-medium);
        color: var(--sk-text-primary);
        text-decoration: none;
        transition: color var(--sk-transition-fast);
      }
      a.bc-info-value:hover {
        color: var(--sk-primary);
      }
      .bc-copy-btn {
        opacity: 0;
        transition: opacity var(--sk-transition-fast);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.375rem;
        border-radius: var(--sk-radius-md);
        color: var(--sk-text-tertiary);
        font-size: 1rem;
      }
      .bc-info-row:hover .bc-copy-btn {
        opacity: 1;
      }
      .bc-copy-btn:hover {
        background: var(--sk-bg-muted);
        color: var(--sk-text-primary);
      }
      /* Availability badge */
      .bc-avail-badge {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.625rem 1rem;
        border-radius: var(--sk-radius-xl);
        font-size: var(--sk-text-sm);
        font-weight: var(--sk-font-semibold);
      }
      .bc-avail-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      /* Sections */
      .bc-section {
        padding: 0.75rem 1.5rem;
        border-top: 1px solid var(--sk-border);
      }
      .bc-section-form {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--sk-border);
        background: var(--sk-bg-muted);
      }
      /* Notify toggle buttons */
      .bc-notify-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.375rem;
        padding: 0.5rem;
        border-radius: var(--sk-radius-xl);
        font-size: var(--sk-text-xs);
        font-weight: var(--sk-font-semibold);
        border: 1px solid var(--sk-border);
        background: none;
        color: var(--sk-text-placeholder);
        cursor: pointer;
        transition: all var(--sk-transition-base);
        font-family: var(--sk-font-sans);
      }
      .bc-notify-btn:hover {
        background: var(--sk-bg-muted);
      }
      /* Responsive footer padding */
      @media (max-width: 767px) {
        .bc-page > footer {
          margin-bottom: 5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="sk-app">
      <!-- Sidebar injected by layout.js -->
      <main class="sk-main">
        <div class="sk-page" style="padding-top: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
          <div class="bc-page" style="min-height: auto; width: 100%;">
      

      <!-- Main Content -->
      <main id="broadcastMain" class="bc-container">
        <div class="bc-card">
          <!-- Hero Section -->
          <div class="bc-hero">
            <img id="userImage" src="../static/images/image.png" alt="User" class="bc-avatar">
            <h1 id="userName" class="bc-name">Loading...</h1>
          </div>

          <!-- Broadcast Message (hidden by default) -->
          <div id="broadcastSection" class="bc-msg-section hidden">
            <p class="bc-msg-label">Active message</p>
            <div id="broadcastMessagePanel" tabindex="0" role="region" aria-label="Broadcast message" class="bc-msg-panel">
              <p id="broadcastMessage" class="bc-msg-text"></p>
            </div>
          </div>

          <!-- Contact Info -->
          <div class="bc-info-list">
            <div class="bc-info-row">
              <div class="bc-info-left">
                <div class="bc-info-icon"><i class="bi bi-telephone-fill"></i></div>
                <div>
                  <p class="bc-info-label">Phone</p>
                  <a id="userPhone" href="tel:" class="bc-info-value">Loading...</a>
                </div>
              </div>
              <button id="copyPhone" class="bc-copy-btn" title="Copy"><i class="bi bi-clipboard"></i></button>
            </div>

            <div class="bc-info-row">
              <div class="bc-info-left">
                <div class="bc-info-icon"><i class="bi bi-at"></i></div>
                <div>
                  <p class="bc-info-label">Email</p>
                  <a id="userEmail" href="mailto:" class="bc-info-value">Loading...</a>
                </div>
              </div>
              <button id="copyEmail" class="bc-copy-btn" title="Copy"><i class="bi bi-clipboard"></i></button>
            </div>

            <div class="bc-info-row">
              <div class="bc-info-left">
                <div class="bc-info-icon"><i class="bi bi-building"></i></div>
                <div>
                  <p class="bc-info-label">Organization</p>
                  <p id="userOrg" class="bc-info-value" style="cursor:default">Loading...</p>
                </div>
              </div>
              <button id="copyOrg" class="bc-copy-btn" title="Copy"><i class="bi bi-clipboard"></i></button>
            </div>
          </div>

          <!-- Availability Status Badge -->
          <div id="availabilityBadge" class="bc-section">
            <div id="availBadgeContent" class="bc-avail-badge" style="background:var(--sk-error-bg);color:var(--sk-error);border:1px solid var(--sk-error-bg)">
              <span class="bc-avail-dot" style="background:var(--sk-error)"></span>
              <span>Currently Unavailable</span>
            </div>
          </div>

          <!-- Action Buttons (role-aware — rendered by JS) -->
          <div id="actionBtnsSection" class="bc-section" style="display:flex;gap:0.5rem">
            <button id="notifyMeBtn" onclick="document.getElementById('subscribeForm').classList.toggle('hidden')" class="sk-btn sk-btn-primary" style="flex:1;font-size:var(--sk-text-sm)">
              <i class="bi bi-bell-fill"></i><span id="notifyBtnLabel">Notify Me When Available</span>
            </button>
            <button id="sendMsgBtn" onclick="document.getElementById('dmForm').classList.toggle('hidden')" class="sk-btn sk-btn-secondary" style="flex:1;font-size:var(--sk-text-sm)">
              <i class="bi bi-envelope-fill"></i>Send Message
            </button>
          </div>

          <!-- Student-specific: Notification preference (hidden by default) -->
          <div id="studentNotifyToggleSection" class="bc-section hidden">
            <p style="font-size:var(--sk-text-xs);color:var(--sk-text-placeholder);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem">Status Notifications</p>
            <div style="display:flex;gap:0.5rem">
              <button onclick="setBroadcastNotifyPref('all')" id="bcNotifyAll" class="bc-notify-btn">
                <i class="bi bi-bell-fill"></i> All updates
              </button>
              <button onclick="setBroadcastNotifyPref('available')" id="bcNotifyAvail" class="bc-notify-btn">
                <i class="bi bi-bell"></i> When available
              </button>
              <button onclick="setBroadcastNotifyPref('none')" id="bcNotifyNone" class="bc-notify-btn">
                <i class="bi bi-bell-slash"></i> Off
              </button>
            </div>
          </div>

          <!-- Student-specific: Chat button (hidden by default) -->
          <div id="studentChatSection" class="bc-section hidden">
            <button id="studentChatBtn" onclick="handleStudentChat()" class="sk-btn sk-btn-gradient" style="width:100%">
              <i class="bi bi-chat-dots"></i>Send Message
            </button>
          </div>

          <!-- Owner message (hidden by default) -->
          <div id="ownerSection" class="bc-section hidden" style="text-align:center;background:var(--sk-bg-muted)">
            <p style="font-size:var(--sk-text-xs);color:var(--sk-text-tertiary)"><i class="bi bi-eye-slash" style="margin-right:0.25rem"></i>This is your broadcast page. Visitors see the buttons above.</p>
          </div>

          <!-- Subscribe Form (hidden by default) -->
          <div id="subscribeForm" class="bc-section-form hidden">
            <p id="subCopy" style="font-size:var(--sk-text-xs);color:var(--sk-text-secondary);margin-bottom:0.5rem">Get an email notification when this person becomes available:</p>
            <div style="display:flex;gap:0.5rem">
              <input id="subEmail" type="email" placeholder="your@email.com" class="sk-input" style="flex:1">
              <button onclick="doSubscribe()" class="sk-btn sk-btn-primary sk-btn-sm">Subscribe</button>
            </div>
            <p id="subResult" class="hidden" style="font-size:var(--sk-text-xs);margin-top:0.5rem"></p>
          </div>

          <!-- DM Form (hidden by default, for anonymous visitors) -->
          <div id="dmForm" class="bc-section-form hidden">
            <p style="font-size:var(--sk-text-xs);color:var(--sk-text-secondary);margin-bottom:0.5rem">Send a private message:</p>
            <input id="dmName" type="text" placeholder="Your name" class="sk-input" style="margin-bottom:0.5rem">
            <input id="dmEmail" type="email" placeholder="Your email" class="sk-input" style="margin-bottom:0.5rem">
            <input id="dmSubject" type="text" placeholder="Subject (optional)" class="sk-input" style="margin-bottom:0.5rem">
            <textarea id="dmBody" placeholder="Your message..." class="sk-textarea" rows="3" style="margin-bottom:0.5rem"></textarea>
            <button onclick="doSendDm()" class="sk-btn sk-btn-primary" style="width:100%">Send</button>
            <p id="dmResult" class="hidden" style="font-size:var(--sk-text-xs);margin-top:0.5rem"></p>
          </div>
        </div>
      </main>

      

      
    </div>
        </div>
      </main>

      <!-- Mobile Bottom Nav -->
      <nav class="sk-bottom-nav">
        <div class="sk-bottom-nav-items">
          <!-- Injected by JS -->
        </div>
      </nav>
    </div>

    <!-- API Config -->
    <script src="../static/js/api-config.js?v=3"></script>
    <script src="../static/js/utils.js"></script>
    <script src="../static/js/theme.js?v=ui-fix-14"></script>
    <script src="../static/js/components.js"></script>
    <script src="../static/js/layout.js?v=ui-fix-30"></script>
    <script>
      SKLayout.setupPublicNav && SKLayout.setupPublicNav('broadcast');
    </script>

    <script>
      // Get user slug from URL parameter
      const urlParams = new URLSearchParams(window.location.search);
      const userSlug =
        urlParams.get("user") ||
        window.location.pathname.split("/").pop().replace(".html", "");

      // Load user data
      async function loadUserData() {
        try {
          const response = await fetch(
            `${API_BASE_URL}/api/broadcast/${userSlug}/`,
          );

          if (!response.ok) {
            throw new Error(
              `API returned ${response.status}: Endpoint not implemented`,
            );
          }

          const data = await response.json();

          // Update user information
          document.getElementById("userName").textContent =
            data.username || data.user_username || "User";
          document.getElementById("userPhone").textContent =
            data.phone_number || "N/A";
          document.getElementById("userPhone").href =
            `tel:${data.phone_number || ""}`;
          document.getElementById("userEmail").textContent =
            data.email || data.user_email || "N/A";
          document.getElementById("userEmail").href =
            `mailto:${data.email || data.user_email || ""}`;
          document.getElementById("userOrg").textContent =
            data.organization || "N/A";

          if (data.profile_image) {
            document.getElementById("userImage").src =
              resolveProfileImage(data.profile_image);
          }

          // Show broadcast message or default status if exists
          const displayMsg = data.active_message || data.default_status;
          if (displayMsg) {
            document.getElementById("broadcastMessage").textContent = displayMsg;
            document.getElementById("broadcastSection").classList.remove("hidden");
            focusBroadcastMessage();
          }

          // Update availability badge
          updateAvailBadge(data.is_available, displayMsg);

          // Track this page view for analytics
          trackPageVisit();

          // Setup copy buttons
          document.getElementById("copyPhone").onclick = () =>
            copyToClipboard(data.phone_number || "N/A");
          document.getElementById("copyEmail").onclick = () =>
            copyToClipboard(data.email || data.user_email || "N/A");
          document.getElementById("copyOrg").onclick = () =>
            copyToClipboard(data.organization || "N/A");

          // Apply role-aware behavior (hides/shows buttons based on who's viewing)
          applyRoleAwareBehavior(data);
        } catch (error) {
          console.error("Error loading user data:", error);
          showErrorState(error.message);
        }
      }

      function showErrorState(errorMsg) {
        document.getElementById("userName").textContent = "User Not Found";
        document.getElementById("userPhone").textContent = "Endpoint Missing";
        document.getElementById("userEmail").textContent = "See Console";
        document.getElementById("userOrg").textContent = "API Error";

        // Show error in broadcast section
        document.getElementById("broadcastMessage").innerHTML = `
          <strong>⚠️ Backend API Endpoint Missing</strong><br><br>
          The public broadcast endpoint <code>/api/broadcast/{slug}/</code> is not implemented.<br><br>
          <small>Error: ${errorMsg}</small>
        `;
        document.getElementById("broadcastSection").classList.remove("hidden");
        focusBroadcastMessage();

        console.error(`
╔════════════════════════════════════════════════════════════════╗
║                    MISSING API ENDPOINT                        ║
╠════════════════════════════════════════════════════════════════╣
║ The broadcast page requires a PUBLIC endpoint (no auth needed) ║
║                                                                ║
║ Required Endpoint:                                             ║
║   GET /api/broadcast/{user_slug}/                              ║
║                                                                ║
║ Expected Response:                                             ║
║   {                                                            ║
║     "username": "string",                                      ║
║     "email": "string",                                         ║
║     "phone_number": "string",                                  ║
║     "organization": "string",                                  ║
║     "profile_image": "/media/path/to/image.jpg",               ║
║     "active_message": "string or null"                         ║
║   }                                                            ║
║                                                                ║
║ This endpoint should:                                          ║
║   1. Accept user slug as URL parameter                         ║
║   2. NOT require authentication (public access)                ║
║   3. Return user details + active broadcast message            ║
║                                                                ║
║ Current slug: ${userSlug}                                      ║
╚════════════════════════════════════════════════════════════════╝
        `);
      }

      function focusBroadcastMessage() {
        var section = document.getElementById("broadcastSection");
        var panel = document.getElementById("broadcastMessagePanel");
        if (!section || !panel || section.classList.contains("hidden")) {
          return;
        }
        section.scrollIntoView({ behavior: "smooth", block: "center" });
        window.setTimeout(function () {
          try {
            panel.focus({ preventScroll: true });
          } catch (e) {
            panel.focus();
          }
        }, 450);
      }

      (function applyBroadcastNavLayout() {
        var authed = !!localStorage.getItem("access_token");
        var nav = document.getElementById("broadcastNav");
        var main = document.getElementById("broadcastMain");
        if (!authed) {
          if (nav) nav.classList.add("hidden");
        }
      })();

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          const toast = document.createElement("div");
          toast.textContent = "Copied";
          toast.className = "bc-toast";
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 2000);
        });
      }

      // --- Availability Badge ---
      function updateAvailBadge(isAvailable, activeMessage) {
        var badge = document.getElementById('availBadgeContent');
        var notifyLabel = document.getElementById('notifyBtnLabel');
        var subCopy = document.getElementById('subCopy');
        if (isAvailable) {
          badge.style.background = 'var(--sk-success-bg)';
          badge.style.color = 'var(--sk-success)';
          badge.style.border = '1px solid var(--sk-success-bg)';
          badge.innerHTML = '<span class="bc-avail-dot animate-pulse" style="background:var(--sk-success)"></span><span>Currently Available</span>' +
            (activeMessage ? '<span style="font-size:var(--sk-text-xs);opacity:0.8;margin-left:0.5rem">— ' + activeMessage + '</span>' : '');
          if (notifyLabel) notifyLabel.textContent = 'Notify Me of Changes';
          if (subCopy) subCopy.textContent = 'Get notified about status changes:';
        } else {
          badge.style.background = 'var(--sk-error-bg)';
          badge.style.color = 'var(--sk-error)';
          badge.style.border = '1px solid var(--sk-error-bg)';
          badge.innerHTML = '<span class="bc-avail-dot" style="background:var(--sk-error)"></span><span>Currently Unavailable</span>' +
            (activeMessage ? '<span style="font-size:var(--sk-text-xs);opacity:0.8;margin-left:0.5rem">— ' + activeMessage + '</span>' : '');
          if (notifyLabel) notifyLabel.textContent = 'Notify Me When Available';
          if (subCopy) subCopy.textContent = 'Get an email when this person becomes available:';
        }
      }

      // --- Analytics Tracking ---
      function trackPageVisit() {
        var source = (new URLSearchParams(window.location.search)).get('source') || 'page';
        var headers = { 'Content-Type': 'application/json' };
        var token = localStorage.getItem('access_token');
        if (token) headers['Authorization'] = 'Bearer ' + token;
        fetch(API_BASE_URL + '/api/scheduler/analytics/track/', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ slug: userSlug, source: source })
        }).catch(function () {});
      }

      // --- Subscribe ---
      async function doSubscribe() {
        var email = document.getElementById('subEmail').value.trim();
        var el = document.getElementById('subResult');
        if (!email) { el.textContent = 'Please enter your email'; el.style.color = 'var(--sk-error)'; el.classList.remove('hidden'); return; }
        try {
          var res = await fetch(API_BASE_URL + '/api/notifications/subscribe/' + userSlug + '/', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
          });
          var data = await res.json();
          el.textContent = data.message || 'Subscribed!';
          el.style.color = 'var(--sk-success)';
          el.classList.remove('hidden');
          document.getElementById('subEmail').value = '';
        } catch (e) {
          el.textContent = 'Failed to subscribe'; el.style.color = 'var(--sk-error)'; el.classList.remove('hidden');
        }
      }

      // --- Send DM ---
      async function doSendDm() {
        var name = document.getElementById('dmName').value.trim();
        var email = document.getElementById('dmEmail').value.trim();
        var subject = document.getElementById('dmSubject').value.trim();
        var body = document.getElementById('dmBody').value.trim();
        var el = document.getElementById('dmResult');
        if (!name || !email || !body) { el.textContent = 'Name, email, and message are required'; el.style.color = 'var(--sk-error)'; el.classList.remove('hidden'); return; }
        try {
          var res = await fetch(API_BASE_URL + '/api/messaging/' + userSlug + '/send/', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sender_name: name, sender_email: email, subject: subject, body: body })
          });
          var data = await res.json();
          if (res.ok) {
            el.textContent = data.message || 'Message sent!';
            el.style.color = 'var(--sk-success)';
            document.getElementById('dmName').value = ''; document.getElementById('dmEmail').value = '';
            document.getElementById('dmSubject').value = ''; document.getElementById('dmBody').value = '';
          } else {
            el.textContent = JSON.stringify(data); el.style.color = 'var(--sk-error)';
          }
          el.classList.remove('hidden');
        } catch (e) {
          el.textContent = 'Failed to send message'; el.style.color = 'var(--sk-error)'; el.classList.remove('hidden');
        }
      }

      // --- Role-Aware Broadcast Page Logic ---
      var _broadcastFacultyUserId = null;
      var _broadcastStudentInterestId = null;

      async function applyRoleAwareBehavior(facultyData) {
        var token = localStorage.getItem('access_token');
        if (!token) return; // Anonymous — keep default behavior

        try {
          var meRes = await fetch(API_BASE_URL + '/api/auth/users/me/', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (!meRes.ok) return;
          var me = await meRes.json();

          _broadcastFacultyUserId = facultyData.user_id || null;

          // Case 1: Same faculty viewing their own page
          if (me.role === 'FACULTY' && me.username === (facultyData.username || facultyData.user_username)) {
            document.getElementById('actionBtnsSection').classList.add('hidden');
            document.getElementById('ownerSection').classList.remove('hidden');
            return;
          }

          // Case 2: Student logged in
          if (me.role === 'STUDENT' && _broadcastFacultyUserId) {
            // Hide anonymous DM buttons, show student-specific UI
            document.getElementById('actionBtnsSection').classList.add('hidden');
            document.getElementById('studentChatSection').classList.remove('hidden');
            document.getElementById('studentNotifyToggleSection').classList.remove('hidden');

            // Check notify preference status
            try {
              var intRes = await fetch(API_BASE_URL + '/api/dashboard/student-interests/', {
                headers: { 'Authorization': 'Bearer ' + token }
              });
              if (intRes.ok) {
                var interests = await intRes.json();
                var match = interests.find(function (i) { return i.faculty === _broadcastFacultyUserId; });
                if (match) {
                  _broadcastStudentInterestId = match.id;
                  _highlightBcNotifyPref(match.notify_preference || 'none');
                }
              }
            } catch (e) {}

            // Check for existing chat thread
            try {
              var chatRes = await fetch(API_BASE_URL + '/api/messaging/chat/check/' + _broadcastFacultyUserId + '/', {
                headers: { 'Authorization': 'Bearer ' + token }
              });
              if (chatRes.ok) {
                var chatData = await chatRes.json();
                var chatBtn = document.getElementById('studentChatBtn');
                if (chatData.has_thread) {
                  chatBtn.innerHTML = '<i class="bi bi-chat-dots"></i>Continue Chat';
                  chatBtn.onclick = function () {
                    window.location.href = '../dashboard/student.html?tab=messages&thread=' + chatData.thread_id;
                  };
                } else {
                  chatBtn.innerHTML = '<i class="bi bi-chat-dots"></i>Send Message';
                  chatBtn.onclick = function () { showStudentChatInitForm(); };
                }
              }
            } catch (e) {}
          }
        } catch (e) { console.error('Role detection error:', e); }
      }

      function _highlightBcNotifyPref(pref) {
        var map = { all: 'bcNotifyAll', available: 'bcNotifyAvail', none: 'bcNotifyNone' };
        var activeStyles = {
          all: 'background:var(--sk-info-bg);color:var(--sk-info);border-color:var(--sk-info)',
          available: 'background:var(--sk-success-bg);color:var(--sk-success);border-color:var(--sk-success)',
          none: 'background:var(--sk-bg-muted);color:var(--sk-text-tertiary);border-color:var(--sk-border)'
        };
        Object.keys(map).forEach(function (k) {
          var el = document.getElementById(map[k]);
          if (!el) return;
          if (k === pref) {
            el.style.cssText = activeStyles[k];
          } else {
            el.style.cssText = '';
          }
        });
      }

      async function setBroadcastNotifyPref(pref) {
        if (!_broadcastStudentInterestId) return;
        var token = localStorage.getItem('access_token');
        try {
          await fetch(API_BASE_URL + '/api/dashboard/student-interests/' + _broadcastStudentInterestId + '/', {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ notify_preference: pref })
          });
          _highlightBcNotifyPref(pref);
        } catch (e) {}
      }

      function showStudentChatInitForm() {
        var section = document.getElementById('studentChatSection');
        section.innerHTML =
          '<div class="bc-section-form" style="padding:0">' +
          '<p style="font-size:var(--sk-text-xs);font-weight:600;color:var(--sk-text-secondary);margin-bottom:0.5rem">Start a chat with this faculty:</p>' +
          '<input type="text" id="bcChatSubject" placeholder="Subject (e.g. Office hours)" class="sk-input" style="margin-bottom:0.5rem">' +
          '<textarea id="bcChatBody" placeholder="Your message..." class="sk-textarea" rows="3" style="margin-bottom:0.5rem"></textarea>' +
          '<button onclick="submitBroadcastChat()" class="sk-btn sk-btn-gradient" style="width:100%">Send</button>' +
          '<p id="bcChatResult" class="hidden" style="font-size:var(--sk-text-xs);margin-top:0.5rem"></p>' +
          '</div>';
      }

      async function submitBroadcastChat() {
        var subject = document.getElementById('bcChatSubject').value.trim();
        var body = document.getElementById('bcChatBody').value.trim();
        var el = document.getElementById('bcChatResult');
        if (!subject || !body) { el.textContent = 'Subject and message are required.'; el.style.color = 'var(--sk-error)'; el.classList.remove('hidden'); return; }
        try {
          var token = localStorage.getItem('access_token');
          var res = await fetch(API_BASE_URL + '/api/messaging/chat/initiate/', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ faculty_id: _broadcastFacultyUserId, subject: subject, body: body })
          });
          var data = await res.json();
          if (res.ok) {
            el.textContent = 'Chat started! Waiting for faculty to accept.';
            el.style.color = 'var(--sk-success)';
            el.classList.remove('hidden');
            setTimeout(function () {
              var section = document.getElementById('studentChatSection');
              section.innerHTML = '<button onclick="window.location.href=\'../dashboard/student.html?tab=messages&thread=' + data.id + '\'" class="sk-btn sk-btn-gradient" style="width:100%"><i class="bi bi-chat-dots" style="margin-right:0.25rem"></i>Continue Chat</button>';
            }, 1500);
          } else {
            if (data.thread_id) {
              window.location.href = '../dashboard/student.html?tab=messages&thread=' + data.thread_id;
              return;
            }
            el.textContent = data.error || 'Failed to start chat.';
            el.style.color = 'var(--sk-error)'; el.classList.remove('hidden');
          }
        } catch (e) {
          el.textContent = 'Failed to send.'; el.style.color = 'var(--sk-error)'; el.classList.remove('hidden');
        }
      }

      function handleStudentChat() { showStudentChatInitForm(); }

      // Load data on page load
      loadUserData().then(function () {
        // applyRoleAwareBehavior is called inside loadUserData after data is loaded
      });

      // Auth-aware nav update
      const isAuthenticated = !!localStorage.getItem("access_token");
      if (isAuthenticated) {
        const desktopNav = document.getElementById("desktopNav");
        if (desktopNav) {
          desktopNav.innerHTML = `
            <a href="../dashboard/home.html" class="sk-public-nav-link">Dashboard</a>
            <a href="../dashboard/profile.html" class="sk-public-nav-link">Profile</a>
            <a href="#" onclick="logoutUser(); return false;" class="sk-btn sk-btn-ghost sk-btn-sm" style="color:var(--sk-error)">Logout</a>
          `;
        }
        const mobileRoot = document.getElementById("mobileNavRoot");
        if (mobileRoot) {
          mobileRoot.innerHTML = `
            <div class="sk-bottom-nav-items">
              <a href="../dashboard/home.html" class="sk-bottom-nav-item active"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
              <a href="../dashboard/profile.html" class="sk-bottom-nav-item"><i class="bi bi-person-circle"></i><span>Profile</span></a>
              <a href="#" onclick="logoutUser(); return false;" class="sk-bottom-nav-item" style="color:var(--sk-error)"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>
            </div>
          `;
        }
      }

      function logoutUser() {
        localStorage.removeItem("access_token");
        localStorage.removeItem("refresh_token");
        window.location.href = "../index.html";
      }

      // Load contributors for footer
      async function loadFooterContributors() {
        try {
          const response = await fetch(window.sirKothayContributorsApiUrl());
          const contributors = await response.json();
          const container = document.getElementById("contributorAvatarsFooter");
          if (container) {
            container.innerHTML = contributors
              .slice(0, 6)
              .map(
                (c) =>
                  `<a href="${c.html_url}" target="_blank" style="display:inline-block;width:24px;height:24px;border-radius:50%;overflow:hidden;border:1px solid var(--sk-border)">
                    <img src="${c.avatar_url}" style="width:100%;height:100%;object-fit:cover" alt="${c.login}">
                  </a>`,
              )
              .join("");
          }
        } catch (error) {
          console.error("Error loading contributors:", error);
        }
      }
      loadFooterContributors();
    </script>
  </body>
</html>
